<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecting your TikTok account – AI Clipper</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <meta name="robots" content="noindex">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           background: #0a0a0a; color: #f0f0f0; line-height: 1.6;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { max-width: 460px; width: 100%; background: #141414; border: 1px solid #2a2a2a;
            border-radius: 18px; padding: 40px 34px; text-align: center; }
    .icon { width: 72px; height: 72px; border-radius: 17px; margin: 0 auto 22px; display: block;
            box-shadow: 0 10px 34px rgba(0,113,227,0.25); }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.01em; }
    p { color: #9a9a9a; font-size: 0.96rem; margin-bottom: 8px; }
    .spinner { width: 30px; height: 30px; border: 3px solid #2a2a2a; border-top-color: #2aa9ff;
               border-radius: 50%; margin: 22px auto 6px; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }
    .btn { display: inline-block; margin-top: 18px; padding: 12px 22px; border-radius: 10px;
           background: linear-gradient(135deg, #2aa9ff, #0071e3); color: #fff; font-weight: 600;
           text-decoration: none; font-size: 0.95rem; }
    .btn:focus-visible { outline: 3px solid #7cc4ff; outline-offset: 2px; }
    .muted { color: #666; font-size: 0.82rem; margin-top: 20px; }
    .err { color: #ff6b6b; }
    code { background: #1c1c1c; padding: 2px 7px; border-radius: 5px; font-size: 0.85em; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <img class="icon" src="assets/icon.png" alt="AI Clipper icon">
    <div id="content">
      <h1>Connecting your TikTok account…</h1>
      <p>Sending the authorization back to AI Clipper on your computer.</p>
      <div class="spinner" aria-hidden="true"></div>
      <p class="muted">If nothing happens, make sure AI Clipper is running, then use the button below.</p>
      <a id="manual" class="btn" href="#">Open AI Clipper</a>
    </div>
  </div>

  <script>
    // This page is the TikTok OAuth redirect target. It lives on the same domain
    // as the app's official website (required by TikTok). Its only job is to hand
    // the ?code / ?state that TikTok appended back to the AI Clipper desktop app,
    // which runs locally and performs the token exchange.
    (function () {
      var LOCAL = "http://localhost:8000/api/tiktok/callback";
      var qs = window.location.search || "";
      var params = new URLSearchParams(qs);
      var target = LOCAL + qs;
      var content = document.getElementById("content");
      var manual = document.getElementById("manual");
      manual.setAttribute("href", target);

      if (params.get("error")) {
        // User denied, or TikTok returned an error — show it, do not redirect.
        var desc = params.get("error_description") || params.get("error");
        content.innerHTML =
          '<h1 class="err">Authorization cancelled</h1>' +
          '<p>TikTok did not grant access.</p>' +
          '<p><code>' + (desc ? desc.replace(/[<>&]/g, "") : "unknown error") + '</code></p>' +
          '<p class="muted">You can close this tab and try connecting again from AI Clipper.</p>';
        return;
      }

      if (!params.get("code")) {
        content.innerHTML =
          '<h1>Nothing to connect</h1>' +
          '<p>Open this page from the "Connect TikTok" button inside AI Clipper.</p>';
        return;
      }

      // Hand the code back to the local app (top-level navigation to localhost).
      window.location.replace(target);
    })();
  </script>
</body>
</html>
